        { name: "Transformers & Attention", analogy: "Like a classroom project where students pay close attention only to specific classmates whose ideas are relevant to their assigned task, completely ignoring the irrelevant background chatter.", explanation: "The Transformer is a neural network architecture that relies on Self-Attention. Attention mechanisms dynamically compute mathematical weights representing how much each word in a sentence relates to every other word, allowing the model to capture long-range contextual relationships instantly.", healthcare: "Analyzing genomic sequences to spot mutated gene segments that work in tandem over vast molecular distances.", manufacturing: "Predicting machine assembly failure by tracking temporal relationships among sensor pulses across weeks of telemetry data.", agriculture: "Analyzing multispectral drone imagery of a vast orchard to detect systemic crop diseases based on spatial correlations between distant trees." },

/* ============================================================
   SEARCH OVERLAY
   ============================================================ */
function SearchOverlay({ isOpen, onClose, allConcepts, onSelect }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  useEffect(() => {
    if (isOpen) {
      setQuery('');
      setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
    }
  }, [isOpen]);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const results = query.trim()
    ? allConcepts.filter(c =>
        c.name.toLowerCase().includes(query.toLowerCase()) ||
        c.analogy.toLowerCase().includes(query.toLowerCase()) ||
        c.explanation.toLowerCase().includes(query.toLowerCase())
      ).slice(0, 10)
    : [];

  if (!isOpen) return null;

  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-16 px-4" onClick={onClose}>
      <div className="absolute inset-0 bg-slate-900/60 glass"></div>
      <div
        className="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden fade-in"
        onClick={e => e.stopPropagation()}
      >
        <div className="flex items-center gap-3 p-4 border-b border-slate-100">
          <span className="material-symbols-rounded text-slate-400 text-[20px]">search</span>
          <input
            ref={inputRef}
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search all 56 concepts, analogies, explanations..."
            className="flex-1 text-sm outline-none text-slate-800 bg-transparent placeholder-slate-400"
          />
          <kbd className="hidden sm:flex items-center gap-0.5 px-2 py-0.5 bg-slate-100 text-slate-500 text-xs font-mono rounded border border-slate-200">ESC</kbd>
        </div>
        {results.length > 0 ? (
          <div className="max-h-80 overflow-y-auto">
            {results.map((con, idx) => (
              <button
                key={idx}
                onClick={() => { onSelect(con); onClose(); }}
                className="w-full text-left px-4 py-3 hover:bg-amber-50 border-b border-slate-50 flex items-center gap-3 group transition-colors"
              >
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold uppercase tracking-wider whitespace-nowrap">{con.chapterTitle}</span>
                  </div>
                  <p className="text-sm font-semibold text-slate-800 group-hover:text-amber-700 transition-colors">{con.name}</p>
                  <p className="text-xs text-slate-500 line-clamp-1 mt-0.5">{con.analogy}</p>
                </div>
                <span className="material-symbols-rounded text-slate-300 group-hover:text-amber-500 text-[18px] shrink-0">arrow_forward</span>
              </button>
            ))}
          </div>
        ) : query ? (
          <div className="p-8 text-center text-slate-400">
            <span className="material-symbols-rounded text-3xl block mb-2">search_off</span>
            <p className="text-sm">No results for "{query}"</p>
          </div>
        ) : (
          <div className="p-6 text-center text-slate-400">
            <p className="text-sm">Type to search all {allConcepts.length} concepts across 8 chapters</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   QUIZ MODE
   ============================================================ */
function QuizMode({ allConcepts, learnedConcepts, onToggleLearned, onClose, startChapterId }) {
  const [filter, setFilter] = useState(startChapterId ? 'chapter' : 'all');
  const [chapterId, setChapterId] = useState(startChapterId || 'model-foundations');
  const [index, setIndex] = useState(0);
  const [revealed, setRevealed] = useState(false);

  const pool = filter === 'unlearned'
    ? allConcepts.filter(c => !learnedConcepts[c.chapterId + '-' + c.name])
    : filter === 'chapter'
      ? allConcepts.filter(c => c.chapterId === chapterId)
      : allConcepts;

  const current = pool[index] || null;

  const next = (markLearned) => {
    if (current && markLearned) onToggleLearned(current.chapterId + '-' + current.name);
    setRevealed(false);
    setIndex(i => Math.min(i + 1, pool.length));
  };

  useEffect(() => { setIndex(0); setRevealed(false); }, [filter, chapterId]);

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const chapterOptions = handbookData.chapters.map(ch => ({ id: ch.id, title: ch.title }));

  return (
    <div className="fixed inset-0 z-50 bg-[#0F172A] flex flex-col items-center justify-start overflow-y-auto">
      <div className="w-full max-w-2xl px-4 py-8 flex flex-col gap-6">
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-4">
            <button onClick={onClose} className="p-2.5 rounded-xl bg-slate-800 text-slate-400 hover:text-white transition-colors border border-slate-700">
              <span className="material-symbols-rounded">close</span>
            </button>
            <div>
              <p className="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Quiz Mode</p>
              <p className="text-white font-bold text-sm">{pool.length > 0 ? (index + 1) + ' / ' + pool.length : '0 concepts'}</p>
            </div>
          </div>
          <div className="flex flex-wrap gap-1.5">
            {['all', 'chapter', 'unlearned'].map(f => (
              <button
                key={f}
                onClick={() => setFilter(f)}
                className={'px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all ' + (filter === f ? 'bg-amber-500 text-slate-900' : 'bg-slate-800 text-slate-400 hover:text-white border border-slate-700')}
              >
                {f === 'all' ? 'All Chapters' : f === 'chapter' ? 'One Chapter' : 'Not Learned'}
              </button>
            ))}
          </div>
        </div>

        {filter === 'chapter' && (
          <select
            value={chapterId}
            onChange={e => setChapterId(e.target.value)}
            className="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl px-4 py-2.5 outline-none focus:border-amber-500"
          >
            {chapterOptions.map(ch => (
              <option key={ch.id} value={ch.id}>{ch.title}</option>
            ))}
          </select>
        )}

        {pool.length > 0 && index < pool.length && (
          <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div
              className="h-full bg-amber-500 rounded-full transition-all duration-500"
              style={{ width: ((index + 1) / pool.length * 100) + '%' }}
            ></div>
          </div>
        )}

        {!current ? (
          <div className="bg-slate-800 border border-slate-700 rounded-3xl p-12 text-center">
            <span className="material-symbols-rounded text-5xl text-emerald-400 block mb-4">celebration</span>
            <h3 className="text-2xl font-bold font-serif text-white mb-2">
              {pool.length === 0 ? 'No Concepts to Review' : 'All Done!'}
            </h3>
            <p className="text-slate-400 mb-6 text-sm">
              {pool.length === 0 ? 'Try a different filter.' : 'You\'ve reviewed all concepts in this set.'}
            </p>
            <div className="flex gap-3 justify-center">
              <button onClick={() => { setIndex(0); setRevealed(false); }} className="px-5 py-2.5 bg-slate-700 text-white rounded-xl font-bold text-sm hover:bg-slate-600 transition-colors">Restart Set</button>
              <button onClick={onClose} className="px-5 py-2.5 bg-amber-500 text-slate-900 rounded-xl font-bold text-sm hover:bg-amber-400 transition-colors">Back to Handbook</button>
            </div>
          </div>
        ) : (
          <div className="space-y-4">
            <div className="bg-slate-800 border border-slate-700 rounded-3xl p-8 text-center">
              <span className="inline-block text-[9px] bg-amber-500/20 text-amber-400 border border-amber-500/30 px-3 py-1 rounded-full font-bold uppercase tracking-wider mb-4">{current.chapterTitle}</span>
              <h3 className="text-2xl font-bold font-serif text-white mb-6">{current.name}</h3>
              {!revealed && (
                <button
                  onClick={() => setRevealed(true)}
                  className="px-8 py-3 bg-amber-500 text-slate-900 rounded-2xl font-bold hover:bg-amber-400 transition-colors"
                >
                  Reveal Analogy &amp; Explanation
                </button>
              )}
            </div>

            {revealed && (
              <div className="space-y-3 fade-in">
                <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-5">
                  <p className="text-sm italic font-medium text-amber-100 leading-relaxed">"{current.analogy}"</p>
                </div>
                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5">
                  <p className="text-sm text-slate-200 leading-relaxed">{current.explanation}</p>
                </div>
                <div className="flex gap-3 pt-1">
                  <button
                    onClick={() => next(true)}
                    className="flex-1 py-4 bg-emerald-500 hover:bg-emerald-400 text-white rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors"
                  >
                    <span className="material-symbols-rounded">check_circle</span>
                    Got It!
                  </button>
                  <button
                    onClick={() => next(false)}
                    className="flex-1 py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors"
                  >
                    <span className="material-symbols-rounded">refresh</span>
                    Review Again
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

                  <div>
                    <h5 className="font-bold text-white capitalize mb-1">{appendixIndustry} Deployment Example</h5>
                    <p className="text-slate-300 leading-relaxed text-sm">{appendixConcept[appendixIndustry]}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App() {
  const [activeChapterId, setActiveChapterId] = useState('model-foundations');
  const [activeView, setActiveView] = useState('chapter');
  const [conceptModal, setConceptModal] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [quizOpen, setQuizOpen] = useState(false);
  const [quizStartChapter, setQuizStartChapter] = useState(null);
  const [appendixConcept, setAppendixConcept] = useState(null);
  const [learnedConcepts, setLearnedConcepts] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ai-handbook-progress') || '{}'); }
    catch (e) { return {}; }
  });

  const mainRef = useRef(null);

  const allConcepts = handbookData.chapters.flatMap(ch =>
    ch.concepts.map(con => ({ ...con, chapterId: ch.id, chapterTitle: ch.title }))
  );

  const activeChapter = handbookData.chapters.find(c => c.id === activeChapterId);

  useEffect(() => {
    try { localStorage.setItem('ai-handbook-progress', JSON.stringify(learnedConcepts)); }
    catch (e) {}
  }, [learnedConcepts]);

  useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setSearchOpen(true); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  useEffect(() => {
    if (mainRef.current) mainRef.current.scrollTop = 0;
  }, [activeChapterId, activeView]);

  const toggleLearned = (key) => {
    setLearnedConcepts(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const getProgress = (chId) => {
    const ch = handbookData.chapters.find(c => c.id === chId);
    if (!ch) return { learned: 0, total: 0, pct: 0 };
    const learned = ch.concepts.filter(c => learnedConcepts[chId + '-' + c.name]).length;
    return { learned, total: ch.concepts.length, pct: Math.round(learned / ch.concepts.length * 100) };
  };

  const totalLearned = Object.values(learnedConcepts).filter(Boolean).length;

  const handleSearchSelect = (concept) => {
    setActiveChapterId(concept.chapterId);
    setActiveView('chapter');
    setConceptModal(concept);
  };

  const handleSendToAppendix = (con) => {
    setAppendixConcept(con);
    setActiveView('appendix');

    setQuizStartChapter(chapterId || null);
    setQuizOpen(true);

        <QuizMode
          allConcepts={allConcepts}

          onToggleLearned={toggleLearned}
          onClose={() => setQuizOpen(false)}

/* Error boundary so a render-time exception shows a readable message
   instead of a silent blank page. */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Handbook render error:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div className="min-h-screen flex items-center justify-center p-8 bg-[#FCFBF7]">
          <div className="max-w-lg bg-white border border-red-200 rounded-2xl p-8 shadow-lg">
            <h1 className="text-xl font-bold text-red-600 mb-2 font-serif">Something went wrong</h1>
            <p className="text-sm text-slate-600 mb-4">The handbook hit a runtime error while rendering. Details:</p>
            <pre className="text-xs bg-slate-900 text-red-300 p-4 rounded-xl overflow-auto whitespace-pre-wrap">{String(this.state.error && this.state.error.stack || this.state.error)}</pre>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

(function mount() {
  const el = document.getElementById('root');
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    el.innerHTML = '<div style="font-family:sans-serif;max-width:640px;margin:60px auto;padding:24px;border:1px solid #fca5a5;border-radius:16px;background:#fff">'
      + '<h1 style="color:#dc2626;margin:0 0 8px">Libraries failed to load</h1>'
      + '<p style="color:#475569;font-size:14px">React or ReactDOM did not load from the CDN. Check your internet connection, then reload. '
      + 'This page needs network access for the React, Babel, and Tailwind CDNs.</p></div>';
    return;
  }
  const root = ReactDOM.createRoot(el);
  root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
})();
</script>
